<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEONWAVE | Круглый звук</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.0"></script>
</head>
<body>
    <div class="stars"></div>
    
    <div class="app">
        <!-- ХЕДЕР -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-head-side-vr"></i>
                <span>NEON<span>WAVE</span></span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i></button>
                <button class="icon-btn" id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i></button>
                <div class="user-badge" id="userBadge">
                    <i class="fas fa-user-astronaut"></i>
                    <span id="userName">ГОСТЬ</span>
                </div>
            </div>
        </header>

        <!-- ПОИСК -->
        <div class="search-bar" id="searchBar" style="display: none;">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Поиск по названию...">
            <button id="closeSearch"><i class="fas fa-times"></i></button>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="main" id="mainContent">
            <div class="welcome-message" id="welcomeMsg">
                <i class="fas fa-head-side-vr"></i>
                <h2>ДОБРО ПОЖАЛОВАТЬ В NEONWAVE</h2>
                <p>Нажми на кнопку <i class="fas fa-cloud-upload-alt"></i> чтобы загрузить первый звук</p>
                <p class="hint">🎵 Звуки отображаются в виде кругов — нажми на любой, чтобы открыть плеер</p>
            </div>
            <div class="sounds-grid" id="soundsGrid"></div>
        </main>

        <!-- НИЖНЕЕ МЕНЮ -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="home">
                <i class="fas fa-home"></i>
                <span>ГЛАВНАЯ</span>
            </button>
            <button class="nav-btn" data-tab="trending">
                <i class="fas fa-fire"></i>
                <span>ТРЕНДЫ</span>
            </button>
            <button class="nav-btn" data-tab="my">
                <i class="fas fa-head-side-headphones"></i>
                <span>МОЁ</span>
            </button>
            <button class="nav-btn" data-tab="favorites">
                <i class="fas fa-heart"></i>
                <span>ИЗБРАННОЕ</span>
            </button>
        </nav>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ЗВУКА -->
    <div class="sound-modal" id="soundModal">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <div class="modal-content" id="modalContent">
                <!-- Сюда загружается содержимое звука -->
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ЗАГРУЗКИ -->
    <div class="upload-modal" id="uploadModal">
        <div class="modal-overlay"></div>
        <div class="modal-container upload-container">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <h2><i class="fas fa-cloud-upload-alt"></i> ЗАГРУЗИТЬ ЗВУК</h2>
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-music"></i>
                <p>Нажми или перетащи файл</p>
                <p class="hint">MP3, WAV, OGG до 10 МБ</p>
                <input type="file" id="audioFile" accept=".mp3,.wav,.ogg">
                <button class="upload-select-btn">ВЫБРАТЬ ФАЙЛ</button>
            </div>
            <div class="upload-progress" id="uploadProgress" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <p id="uploadStatus"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
