<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Juvox Wave | Неоновый браузер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb1"></div>
        <div class="gradient-orb orb2"></div>
        <div class="gradient-orb orb3"></div>
    </div>

    <div class="browser">
        <div class="user-panel" id="userPanel">
            <div class="user-greeting" id="userGreeting">⚡ НЕ АВТОРИЗОВАН</div>
            <div id="authButtons">
                <button class="auth-btn" id="loginBtn">ВХОД</button>
                <button class="auth-btn" id="logoutBtn" style="display:none">ВЫЙТИ</button>
            </div>
            <div class="user-avatar" id="userAvatar" style="display:none">
                <i class="fas fa-user-astronaut"></i>
            </div>
        </div>

        <div class="tab-bar" id="tabBar"></div>

        <div class="nav-bar">
            <button class="nav-btn" id="backBtn"><i class="fas fa-arrow-left"></i> НАЗАД</button>
            <button class="nav-btn" id="forwardBtn"><i class="fas fa-arrow-right"></i> ВПЕРЁД</button>
            <button class="nav-btn" id="reloadBtn"><i class="fas fa-sync-alt"></i> ОБНОВИТЬ</button>
            <button class="nav-btn" id="homeBtn"><i class="fas fa-home"></i> ДОМОЙ</button>
            <input type="text" class="url-bar" id="urlBar" placeholder="🔍 ПОИСК ИЛИ ВВЕДИТЕ АДРЕС...">
            <button class="nav-btn" id="settingsBtn"><i class="fas fa-cog"></i> НАСТРОЙКИ</button>
        </div>

        <div class="viewer">
            <iframe id="webpage" src="https://www.google.com"></iframe>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>✨ НАСТРОЙКИ JUVOX WAVE</h3>
            <div class="setting-item">
                <label>🌍 ПОИСКОВАЯ СИСТЕМА</label>
                <select id="searchEngine">
                    <option value="google">GOOGLE</option>
                    <option value="yandex">ЯНДЕКС</option>
                    <option value="duckduckgo">DUCKDUCKGO</option>
                </select>
            </div>
            <div class="setting-item">
                <label>🎨 ТЕМА</label>
                <select id="theme">
                    <option value="dark">НЕОН (ТЁМНАЯ)</option>
                    <option value="light">СВЕТЛАЯ</option>
                </select>
            </div>
            <div class="setting-item">
                <label>🏠 ДОМАШНЯЯ СТРАНИЦА</label>
                <input type="text" id="homePage" placeholder="https://...">
            </div>
            <button class="save-settings" id="saveSettingsBtn">💾 СОХРАНИТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
